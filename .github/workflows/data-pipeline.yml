name: School Data Ingestion Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to run against
        required: true
        default: test
        type: choice
        options:
        - test
        - production
      review-app-number:
        description: Pull request number of the review app (optional, this will run against the target environment to generate a backup file for that review app to use, and then restore the target DB from backup)
        type: string
        required: false
      rebuild-all-raw-tables:
        description: Ignore the rebuild list and rebuild all raw tables
        type: boolean
        required: false
        default: false
      raw-tables-to-rebuild-path:
        description: Optional override path to the raw tables rebuild list
        type: string
        required: false

  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC

permissions:
  contents: write
  id-token: write   # required if using OIDC with azure/login

jobs:
  ingest:
    name: Ingest Raw Data & Build Warehouse (${{ matrix.target_env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_env: ${{ fromJson(github.event_name == 'schedule' && '["test","production"]' || format('["{0}"]', inputs.environment || 'test')) }}
    environment: ${{ matrix.target_env }}

    env:
      # Blob (currently from GitHub secrets)
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

      # Sensitive source URLs (THREE endpoints in GitHub secrets)
      SENSITIVE_DATASET_URL: ${{ secrets.SENSITIVE_DATASET_URL }}
      SENSITIVE_ESTABLISHMENT_LINKS_URL: ${{ secrets.SENSITIVE_ESTABLISHMENT_LINKS_URL }}
      SENSITIVE_MAT_LINKS_URL: ${{ secrets.SENSITIVE_MAT_LINKS_URL }}

      # Konduit / AKS settings (also in GitHub secrets)
      AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
      AKS_NAMESPACE: ${{ secrets.AKS_NAMESPACE }}
      KONDUIT_APP_NAME: ${{ secrets.KONDUIT_APP_NAME }}

      SERVICE_NAME: get-school-improvement-insights
      SERVICE_SHORT: sapsec
      TF_VARS_PATH: terraform/application/config
      DEPLOY_ENV: ${{ matrix.target_env }}
      DEFAULT_RAW_TABLES_TO_REBUILD_PATH: SAPData/raw_tables_to_rebuild.${{ matrix.target_env }}.txt
      
    steps:
      # ==============================
      # 1. Checkout repo
      # ==============================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Initialise pipeline report directories
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${RUNNER_TEMP}/data-pipeline-report"
          log_dir="${report_dir}/logs"
          mkdir -p "${report_dir}" "${log_dir}"
          echo "PIPELINE_REPORT_DIR=${report_dir}" >> "$GITHUB_ENV"
          echo "PIPELINE_LOG_DIR=${log_dir}" >> "$GITHUB_ENV"

      # ==============================
      # 2. Install dependencies
      # ==============================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-client \
            powershell \
            unzip \
            jq
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      # ==============================
      # 3. Azure login (needed for az aks get-credentials)
      # ==============================
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ==============================
      # 4. AKS access + konduit install
      # ==============================
      - name: Install kubectl (pinned)
        shell: bash
        run: |
          set -euo pipefail
          KUBECTL_VERSION="v1.29.8"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client=true
      - name: Install kubelogin (pinned)
        shell: bash
        run: |
          set -euo pipefail
          KUBELOGIN_VERSION="v0.1.6"
          curl -fsSLo kubelogin.zip "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip"
          unzip -q kubelogin.zip
          sudo install -m 0755 bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
          kubelogin --version
      - name: Configure AKS credentials
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials --overwrite-existing -g "${AKS_RESOURCE_GROUP}" -n "${AKS_CLUSTER_NAME}"
          kubelogin convert-kubeconfig -l azurecli
      - name: Download konduit.sh
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/DFE-Digital/teacher-services-cloud/main/scripts/konduit.sh \
            -o "$GITHUB_WORKSPACE/konduit.sh"
          chmod +x "$GITHUB_WORKSPACE/konduit.sh"
          ls -la "$GITHUB_WORKSPACE/konduit.sh"

      # ==============================
      # 5. Ensure Blob container exists (idempotent)
      # ==============================
      - name: Ensure Blob container exists
        shell: pwsh
        run: |
          az storage container create `
            --name $env:AZURE_STORAGE_CONTAINER `
            --connection-string $env:AZURE_STORAGE_CONNECTION_STRING `
            --public-access off | Out-Null

      # ==============================
      # 6. Download source data and store latest versions in Blob
      #
      # LOGIC
      # - GIAS: 3 sensitive URLs, resolved by yyyyMMdd backtracking.
      #   * Url field in raw_sources.json contains a secret *token* that maps to an env var secret.
      #   * One GIAS file is a ZIP and must be UNZIPPED before upload.
      # - EES: only versioned API datasets are in raw_sources.json (DataSetId set, Url blank).
      # - Unversioned/historical dataset files are manually uploaded as a one-off exercise and stored in BLOB storage.
      #
      # Tracks state in versions.json
      # Outputs:
      #   changed=True/False
      #   latest_files={ key : filename }
      #
      # - Retries for downloads and Azure blob operations.
      # ==============================
      - name: Version datasets from raw_sources.json and upload to Blob
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $conn = $env:AZURE_STORAGE_CONNECTION_STRING
          $container = $env:AZURE_STORAGE_CONTAINER
          $manifestBlobName = "versions.json"
          $sourcesPathRepo = "SAPData/raw_sources.json"
          if (-not (Test-Path $sourcesPathRepo)) { throw "Could not find $sourcesPathRepo in the repo." }
          $workDir = "SAPData/Work/Versioning"
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null
          $reportPath = Join-Path $workDir "step6_report.json"
          $report = [System.Collections.Generic.List[object]]::new()
          # -----------------------------
          # Helpers (retries + reporting)
          # -----------------------------
          function Invoke-WithRetry([scriptblock]$Action, [int]$MaxAttempts = 5, [int]$InitialDelaySeconds = 2, [string]$Label = "operation") {
            $attempt = 0
            $delay = $InitialDelaySeconds
            while ($true) {
              try {
                $attempt++
                return & $Action
              } catch {
                if ($attempt -ge $MaxAttempts) {
                  throw "Failed $Label after $attempt attempts. Last error: $($_.Exception.Message)"
                }
                Write-Host "Retrying $Label (attempt $attempt/$MaxAttempts). Waiting ${delay}s. Error: $($_.Exception.Message)"
                Start-Sleep -Seconds $delay
                $delay = [Math]::Min($delay * 2, 30)
              }
            }
          }
          function Write-Report([string]$key, [string]$org, [string]$status, [string]$finalName, [string]$sig, [string]$resolved, [string]$message = "") {
            $report.Add([pscustomobject]@{
              key = $key
              sourceOrg = $org
              status = $status
              finalName = $finalName
              signature = $sig
              resolved = $resolved
              message = $message
              utcTime = [DateTime]::UtcNow.ToString("o")
            })
          }
          # For safe logging - never print the actual secret URL template.
          function Mask-GiasUrl([string]$urlToken, [string]$resolvedDate, [string]$extension) {
            $t = if ([string]::IsNullOrWhiteSpace($urlToken)) { "GIAS" } else { $urlToken.Trim() }
            $ext = if ([string]::IsNullOrWhiteSpace($extension)) { "" } else { $extension.Trim() }
            return "${t}:{fileDatePostfix}=${resolvedDate}${ext}"
          }
          # -----------------------------
          # Load sources
          # -----------------------------
          $sourcesRaw = Get-Content $sourcesPathRepo -Raw | ConvertFrom-Json
          if ($null -eq $sourcesRaw) { throw "raw_sources.json parsed to null." }
          if ($sourcesRaw -isnot [System.Array]) { $sourcesRaw = @($sourcesRaw) }
          $sources = @()
          foreach ($s in $sourcesRaw) {
            $type     = [string]$s.Type
            $sub      = [string]$s.Subtype
            $year     = [string]$s.Year
            $u        = [string]$s.Url
            $org      = [string]$s.SourceOrg
            $dsid     = [string]$s.DataSetId
            $fileType = ([string]$s.FileType).ToLowerInvariant()
            $fileName = [string]$s.FileName
            if ([string]::IsNullOrWhiteSpace($type) -or
                [string]::IsNullOrWhiteSpace($sub)  -or
                [string]::IsNullOrWhiteSpace($year) -or
                [string]::IsNullOrWhiteSpace($org)) {
              throw "Each entry in raw_sources.json must include Type, Subtype, Year, SourceOrg. Offending entry: $($s | ConvertTo-Json -Compress)"
            }
            if ([string]::IsNullOrWhiteSpace($fileName)) {
              throw "Each entry in raw_sources.json must include FileName. Offending entry: $($s | ConvertTo-Json -Compress)"
            }
            if ([string]::IsNullOrWhiteSpace($fileType)) { $fileType = "csv" }
            if ($fileType -ne "csv" -and $fileType -ne "zip") {
              throw "FileType must be 'csv' or 'zip'. Offending entry: $($s | ConvertTo-Json -Compress)"
            }
            $composite = "${type}_${sub}_${year}"
            $safeKey = ($composite -replace '[^a-zA-Z0-9_\-\.]', '_').ToLowerInvariant()
            $sources += [pscustomobject]@{
              key       = $safeKey
              url       = $u
              type      = $type
              subtype   = $sub
              year      = $year
              sourceOrg = $org
              dataSetId = $dsid
              fileType  = $fileType
              fileName  = $fileName
            }
          }
          if ($sources.Count -eq 0) { throw "No sources found in raw_sources.json" }
          Write-Host "Loaded $($sources.Count) sources."
          # -----------------------------
          # Load manifest from Blob (if present)
          # -----------------------------
          $manifestPath = Join-Path $workDir "versions.json"
          $manifest = @{}
          $manifestExists = Invoke-WithRetry {
            az storage blob exists `
              --container-name $container `
              --name $manifestBlobName `
              --connection-string $conn | ConvertFrom-Json
          } -Label "blob exists (versions.json)"
          if ($manifestExists.exists -eq $true) {
            Invoke-WithRetry {
              az storage blob download `
                --container-name $container `
                --name $manifestBlobName `
                --file "$manifestPath" `
                --connection-string $conn `
                --overwrite true | Out-Null
            } -Label "download versions.json"
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json -AsHashtable
          }
          # -----------------------------
          # Helpers
          # -----------------------------
          function Get-LondonDateYyyyMmDd([int]$daysAgo = 0) {
            $tz = [TimeZoneInfo]::FindSystemTimeZoneById("Europe/London")
            $nowLondon = [TimeZoneInfo]::ConvertTime([DateTimeOffset]::UtcNow, $tz).DateTime.Date
            return $nowLondon.AddDays(-$daysAgo).ToString("yyyyMMdd")
          }
          # Probe existence via Range GET only (no HEAD, no retries, and no URL logging)
          function Try-RangeProbe([string]$testUrl) {
            try {
              $g = Invoke-WithRetry { Invoke-WebRequest -Method Get -Uri $testUrl -Headers @{ Range = "bytes=0-0" } -UseBasicParsing } -MaxAttempts 3 -InitialDelaySeconds 1 -Label "Range GET $testUrl"
              return @{ ok = $true; etag = $g.Headers.ETag; len = $g.Headers.'Content-Length'; lm = $g.Headers.'Last-Modified' }
            } catch {
              return @{ ok = $false; etag = $null; len = $null; lm = $null }
            }
          }
          function Get-EnvVarRequired([string]$name) {
            $v = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($v)) { throw "Required environment variable/secret '$name' is not set." }
            return $v
          }
          function Resolve-GiasTemplateFromToken([string]$token) {
            if ([string]::IsNullOrWhiteSpace($token)) { throw "GIAS Url token was blank." }
            $t = $token.Trim()
            switch ($t) {
              "__SECRET_URL__" { return Get-EnvVarRequired "SENSITIVE_DATASET_URL" }
              "__SECRET_ESTABLISHMENT_LINKS_URL__" { return Get-EnvVarRequired "SENSITIVE_ESTABLISHMENT_LINKS_URL" }
              "__SECRET_MAT_LINKS_URL__" { return Get-EnvVarRequired "SENSITIVE_MAT_LINKS_URL" }
              default { throw "Unknown GIAS secret token '$t'. Add a mapping in Resolve-GiasTemplateFromToken()." }
            }
          }
          function Get-FirstFileFromZip([string]$zipPath, [string]$outDir) {
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            if (-not (Test-Path $zipPath)) { throw "Zip not found: $zipPath" }
            $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
            try {
              $entries = @($zip.Entries | Where-Object { -not [string]::IsNullOrWhiteSpace($_.Name) })
              if ($entries.Count -eq 0) { throw "Zip contains no files: $zipPath" }
              $pick = $entries | Where-Object { $_.Name.ToLowerInvariant().EndsWith(".csv") } | Select-Object -First 1
              if (-not $pick) { $pick = $entries | Select-Object -First 1 }
              New-Item -ItemType Directory -Force -Path $outDir | Out-Null
              $dest = Join-Path $outDir $pick.Name
              $destParent = Split-Path $dest -Parent
              if ($destParent) { New-Item -ItemType Directory -Force -Path $destParent | Out-Null }
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($pick, $dest, $true)
              return $dest
            } finally {
              $zip.Dispose()
            }
          }
          # -----------------------------
          # Main loop
          # -----------------------------
          $anyChanged = $false
          $manifestChanged = $false
          $latestFiles = @{}
          try {
            foreach ($src in $sources) {
              $key         = [string]$src.key
              $org         = [string]$src.sourceOrg
              $dsid        = [string]$src.dataSetId
              $urlToken    = [string]$src.url
              $fileType    = [string]$src.fileType
              $fileNameTpl = [string]$src.fileName
              $resolvedInfo = ""
              $finalName = $null
              $downloadUrl = $null
              $forcedSignature = $null
              try {
                if (-not $manifest.ContainsKey($key)) {
                  $manifest[$key] = @{ latest = 0; lastSignature = ""; lastFileName = "" }
                  $manifestChanged = $true
                }
                $prevSig = [string]$manifest[$key].lastSignature
                $latest  = [int]$manifest[$key].latest
                $hasUrlToken = -not [string]::IsNullOrWhiteSpace($urlToken)
                $hasDsid     = -not [string]::IsNullOrWhiteSpace($dsid)
                # -----------------------------
                # GIAS
                # -----------------------------
                if ($org -eq "GIAS") {
                  if (-not $hasUrlToken) { throw "GIAS entry '$key' must include Url token (e.g. __SECRET_URL__)." }
                  $template = Resolve-GiasTemplateFromToken $urlToken
                  if ($template -notmatch "\{fileDatePostfix\}") { throw "GIAS secret template for '$key' must include {fileDatePostfix} placeholder." }
                  if ($fileNameTpl -notmatch "YYYYmmDD") { throw "GIAS FileName for '$key' must contain 'YYYYmmDD'." }
                  $maxLookbackDays = 30
                  if ($manifest[$key].ContainsKey("lastSuccessDate")) {
                    $lastSuccess = [string]$manifest[$key].lastSuccessDate
                    if ($lastSuccess -match '^\d{8}$') {
                      $tz = [TimeZoneInfo]::FindSystemTimeZoneById("Europe/London")
                      $nowLondon = [TimeZoneInfo]::ConvertTime([DateTimeOffset]::UtcNow, $tz).DateTime.Date
                      $lastDt = [DateTime]::ParseExact($lastSuccess, "yyyyMMdd", [System.Globalization.CultureInfo]::InvariantCulture)
                      $d = [int]($nowLondon - $lastDt).TotalDays
                      if ($d -gt 0) { $maxLookbackDays = [Math]::Min([Math]::Max($d, 1), 90) }
                    }
                  }
                  $resolvedDate = $null
                  $resolvedUrl  = $null
                  $resolvedHdr  = $null
                  for ($i = 0; $i -le $maxLookbackDays; $i++) {
                    $d = Get-LondonDateYyyyMmDd -daysAgo $i
                    $candidate = $template.Replace("{fileDatePostfix}", $d)
                    # Probe existence via Range GET only (quiet, no retries, and does not print URLs)
                    $hdr = Try-RangeProbe $candidate
                    if ($hdr.ok) {
                      $resolvedDate = $d
                      $resolvedUrl  = $candidate
                      $resolvedHdr  = $hdr
                      break
                    }
                  }
                  if (-not $resolvedUrl) { throw "GIAS file not found for today or last $maxLookbackDays days (URL hidden)." }
                  $downloadUrl = $resolvedUrl
                  $manifest[$key].lastSuccessDate = $resolvedDate
                  $resolvedBase = $fileNameTpl.Replace("YYYYmmDD", $resolvedDate)
                  $finalName = "${resolvedBase}.csv"
                  $parts = @("giasDate:$resolvedDate")
                  if ($resolvedHdr.etag) { $parts += "etag:$($resolvedHdr.etag)" }
                  if ($resolvedHdr.lm)   { $parts += "lm:$($resolvedHdr.lm)" }
                  if ($resolvedHdr.len)  { $parts += "len:$($resolvedHdr.len)" }
                  $forcedSignature = ($parts -join "|")
                  # IMPORTANT: never log $downloadUrl or $template
                  $resolvedInfo = Mask-GiasUrl -urlToken $urlToken -resolvedDate $resolvedDate -extension (".${fileType}")
                }
                # -----------------------------
                # EES
                # -----------------------------
                if (-not $finalName -and $org -eq "EES") {
                  if (-not $hasDsid -or $hasUrlToken) { throw "Invalid EES config for '$key': must have DataSetId set AND Url blank." }
                  $versionsUrl = "https://api.education.gov.uk/statistics/v1/data-sets/$dsid/versions"
                  $versions = Invoke-WithRetry {
                    Invoke-WebRequest -Uri $versionsUrl -UseBasicParsing |
                      Select-Object -ExpandProperty Content | ConvertFrom-Json
                  } -Label "EES versions $dsid"
                  $published = @($versions.results | Where-Object { $_.status -eq "Published" })
                  if ($published.Count -eq 0) { throw "No Published versions returned for datasetId '$dsid'." }
                  $latestPub = $published | Sort-Object { [DateTimeOffset]$_.published } -Descending | Select-Object -First 1
                  $dataSetVersion = [string]$latestPub.version
                  $downloadUrl = "https://api.education.gov.uk/statistics/v1/data-sets/$dsid/csv?dataSetVersion=$dataSetVersion"
                  $forcedSignature = "ees:$dsid|version:$dataSetVersion"
                  $finalName = "${fileNameTpl}_v${dataSetVersion}.csv"
                  $manifest[$key].eesLatestVersion = $dataSetVersion
                  $resolvedInfo = "version:$dataSetVersion"
                }
                if (-not $finalName) { throw "Unsupported source config for '$key'. SourceOrg must be GIAS or EES." }
                if ([string]::IsNullOrWhiteSpace($downloadUrl)) { throw "Internal error: downloadUrl not resolved for '$key'." }
                if ([string]::IsNullOrWhiteSpace($forcedSignature)) { throw "Internal error: forced signature missing for '$key'." }
                $signature = $forcedSignature
                $isChanged = ($latest -eq 0) -or ($signature -ne [string]$manifest[$key].lastSignature)
                if ($isChanged) {
                  $oldBlobName = [string]$manifest[$key].lastFileName
                  $tmpDownloadPath = Join-Path $workDir "${key}.download"
                  if ($org -eq "GIAS" -and $fileType -eq "zip") { $tmpDownloadPath = "${tmpDownloadPath}.zip" }
                  else { $tmpDownloadPath = "${tmpDownloadPath}.csv" }
                  # IMPORTANT: do not print $downloadUrl
                  Write-Host "Downloading ${key} from $resolvedInfo to: $tmpDownloadPath"
                  Invoke-WithRetry { Invoke-WebRequest -Uri $downloadUrl -OutFile $tmpDownloadPath -UseBasicParsing } -Label "download $key"
                  if (-not (Test-Path $tmpDownloadPath)) { throw "Download failed; file not found: $tmpDownloadPath" }
                  $uploadPath = $tmpDownloadPath
                  if ($fileType -eq "zip") {
                    $unzDir = Join-Path $workDir "${key}.unzipped"
                    $uploadPath = Get-FirstFileFromZip -zipPath $tmpDownloadPath -outDir $unzDir
                    if (-not (Test-Path $uploadPath)) { throw "Zip extraction failed; extracted file not found: $uploadPath" }
                  }
                  Write-Host "Uploading ${key} -> ${finalName} (from $uploadPath)"
                  Invoke-WithRetry {
                    az storage blob upload `
                      --container-name $container `
                      --name $finalName `
                      --file "$uploadPath" `
                      --connection-string $conn `
                      --overwrite | Out-Null
                  } -Label "upload $finalName"
                  if (-not [string]::IsNullOrWhiteSpace($oldBlobName) -and -not ($oldBlobName.Equals($finalName, [StringComparison]::OrdinalIgnoreCase))) {
                    $oldExists = Invoke-WithRetry {
                      az storage blob exists `
                        --container-name $container `
                        --name $oldBlobName `
                        --connection-string $conn | ConvertFrom-Json
                    } -Label "exists $oldBlobName"
                    if ($oldExists.exists -eq $true) {
                      Write-Host "Deleting old blob for ${key}: ${oldBlobName}"
                      Invoke-WithRetry {
                        az storage blob delete `
                          --container-name $container `
                          --name $oldBlobName `
                          --connection-string $conn | Out-Null
                      } -Label "delete $oldBlobName"
                    }
                  }
                  $anyChanged = $true
                  $manifest[$key].latest = ($latest + 1)
                  $manifest[$key].lastSignature = $signature
                  $manifest[$key].lastFileName = $finalName
                  $latestFiles[$key] = $finalName
                  Write-Host "UPDATED: ${key} -> ${finalName}"
                  Write-Report -key $key -org $org -status "updated" -finalName $finalName -sig $signature -resolved $resolvedInfo
                } else {
                  $lastFile = [string]$manifest[$key].lastFileName
                  if ([string]::IsNullOrWhiteSpace($lastFile)) { $lastFile = $finalName }
                  $latestFiles[$key] = $lastFile
                  Write-Host "UNCHANGED: ${key} remains ${lastFile}"
                  Write-Report -key $key -org $org -status "unchanged" -finalName $lastFile -sig $signature -resolved $resolvedInfo
                }
              } catch {
                Write-Report -key $key -org $org -status "failed" -finalName ($finalName ?? "") -sig ($forcedSignature ?? "") -resolved ($resolvedInfo ?? "") -message $_.Exception.Message
                throw
              }
            }
          } finally {
            $reportJson = $report | ConvertTo-Json -Depth 10
            [System.IO.File]::WriteAllText($reportPath, $reportJson, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "Wrote Step 6 report: $reportPath"
          }
          if ($anyChanged -or $manifestChanged) {
            $json = $manifest | ConvertTo-Json -Depth 30
            [System.IO.File]::WriteAllText($manifestPath, $json, (New-Object System.Text.UTF8Encoding($false)))
            Invoke-WithRetry {
              az storage blob upload `
                --container-name $container `
                --name $manifestBlobName `
                --file "$manifestPath" `
                --connection-string $conn `
                --overwrite | Out-Null
            } -Label "upload versions.json"
          }
          "changed=$anyChanged" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $latestFilesJson = ($latestFiles | ConvertTo-Json -Depth 10 -Compress)
          "latest_files=$latestFilesJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # ==============================
      # 6b. Upload the report
      # ==============================

      - name: Upload Step 6 report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step6-report
          path: SAPData/Work/Versioning/step6_report.json
          if-no-files-found: warn

      - name: Summarise source versioning
        if: always()
        shell: pwsh
        env:
          LATEST_FILES: ${{ steps.version.outputs.latest_files }}
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $reportPath = "SAPData/Work/Versioning/step6_report.json"
          if (-not (Test-Path $reportPath)) {
            $summary = [pscustomobject]@{
              stage = "06-source-versioning"
              status = "failed"
              utcTime = [DateTime]::UtcNow.ToString("o")
              summary = "Step 6 report artifact was not created."
              metadata = [pscustomobject]@{}
            }
            $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-06-source-versioning.json")
            exit 0
          }

          $entries = Get-Content $reportPath -Raw | ConvertFrom-Json
          if ($entries -isnot [System.Array]) { $entries = @($entries) }
          $latestFiles = @{}
          if (-not [string]::IsNullOrWhiteSpace($env:LATEST_FILES)) {
            $latestFiles = $env:LATEST_FILES | ConvertFrom-Json -AsHashtable
          }

          $grouped = $entries | Group-Object status | ForEach-Object { @{ key = $_.Name; count = $_.Count } }
          $metadata = [ordered]@{
            totalSources = @($entries).Count
            statusCounts = $grouped
            latestFileCount = $latestFiles.Keys.Count
            updatedKeys = @($entries | Where-Object status -eq "updated" | Select-Object -ExpandProperty key)
            failedKeys = @($entries | Where-Object status -eq "failed" | Select-Object -ExpandProperty key)
          }
          $summary = [pscustomobject]@{
            stage = "06-source-versioning"
            status = if (($metadata.failedKeys).Count -gt 0) { "failed" } elseif (($metadata.updatedKeys).Count -gt 0) { "changed" } else { "completed" }
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = "Versioned source datasets and recorded changed or unchanged inputs."
            metadata = $metadata
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-06-source-versioning.json")

      # ==============================
      # 7. Download generator inputs from Blob Storage
      #    - Downloads:
      #        (A) ALL manual_* blobs (canonical manual uploads)
      #        (B) ONLY the LATEST managed blobs (from step 6 output latest_files)
      #    - Skips everything else (old managed versions, legacy leftovers, stray blobs)
      # ==============================
      - name: Download generator inputs from Blob Storage (manual_* + latest managed only)
        shell: pwsh
        env:
          LATEST_FILES: ${{ steps.version.outputs.latest_files }}
        run: |
          $ErrorActionPreference = "Stop"
          $rawDir = "SAPData/DataMap/SourceFiles"
          New-Item -ItemType Directory -Force -Path $rawDir | Out-Null
          Get-ChildItem -Path $rawDir -Force | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
          # ---- Load latest managed filenames from step 6 output ----
          $latest = $env:LATEST_FILES | ConvertFrom-Json -AsHashtable
          if (-not $latest -or $latest.Keys.Count -eq 0) { throw "LATEST_FILES output was empty." }
          $latestManagedFiles = New-Object System.Collections.Generic.HashSet[string]([StringComparer]::OrdinalIgnoreCase)
          foreach ($k in $latest.Keys) {
            $fn = [string]$latest[$k]
            if ([string]::IsNullOrWhiteSpace($fn)) { throw "LATEST_FILES contained an empty filename for key '$k'" }
            [void]$latestManagedFiles.Add($fn)
          }
          # ---- List all blobs in container ----
          $blobNamesJson = az storage blob list `
            --container-name $env:AZURE_STORAGE_CONTAINER `
            --connection-string $env:AZURE_STORAGE_CONNECTION_STRING `
            --query "[].name" -o json
          $blobNames = $blobNamesJson | ConvertFrom-Json
          if ($blobNames -isnot [System.Array]) { $blobNames = @($blobNames) }
          if (-not $blobNames -or $blobNames.Count -eq 0) {
            throw "No blobs found in container '$($env:AZURE_STORAGE_CONTAINER)'."
          }
          # ---- Decide what to download ----
          # Rule:
          #   - Download if blob is manual_* (canonical manual uploads)
          #   - Download if blob is exactly one of the latest managed filenames
          #   - Otherwise skip
          $toDownload = New-Object System.Collections.Generic.HashSet[string]([StringComparer]::OrdinalIgnoreCase)
          foreach ($blob in $blobNames) {
            if ([string]::IsNullOrWhiteSpace($blob)) { continue }
            $lower = $blob.ToLowerInvariant()
            if ($lower.StartsWith("manual_")) {
              [void]$toDownload.Add($blob)
              continue
            }
            if ($latestManagedFiles.Contains($blob)) {
              [void]$toDownload.Add($blob)
              continue
            }
          }
          # Safety: ensure all latest managed files are included
          foreach ($mf in $latestManagedFiles) { [void]$toDownload.Add($mf) }
          if ($toDownload.Count -eq 0) { throw "No blobs selected for download." }
          Write-Host "Downloading $($toDownload.Count) blobs (manual_* + latest managed only)"
          foreach ($blob in $toDownload) {
            $dest = Join-Path $rawDir $blob
            az storage blob download `
              --container-name $env:AZURE_STORAGE_CONTAINER `
              --name $blob `
              --file $dest `
              --connection-string $env:AZURE_STORAGE_CONNECTION_STRING `
              --overwrite true | Out-Null
          }
          Write-Host "Downloaded files:"
          $files = Get-ChildItem -Path $rawDir -File | Sort-Object Name
          $files | Select-Object Name, Length | Format-Table -AutoSize

      - name: Summarise generator input download
        if: always()
        shell: pwsh
        env:
          LATEST_FILES: ${{ steps.version.outputs.latest_files }}
        run: |
          $rawDir = "SAPData/DataMap/SourceFiles"
          $reportDir = $env:PIPELINE_REPORT_DIR
          $files = @(Get-ChildItem -Path $rawDir -File -ErrorAction SilentlyContinue)
          $latestFiles = @{}
          if (-not [string]::IsNullOrWhiteSpace($env:LATEST_FILES)) {
            $latestFiles = $env:LATEST_FILES | ConvertFrom-Json -AsHashtable
          }
          $manualCount = @($files | Where-Object { $_.Name.ToLowerInvariant().StartsWith("manual_") }).Count
          $metadata = [ordered]@{
            downloadedCount = $files.Count
            manualFileCount = $manualCount
            latestManagedFileCount = $latestFiles.Keys.Count
            sampleFiles = @($files | Select-Object -First 10 -ExpandProperty Name)
          }
          $summary = [pscustomobject]@{
            stage = "07-download-generator-inputs"
            status = if ($files.Count -gt 0) { "completed" } else { "failed" }
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = "Downloaded manual blobs and the latest managed datasets for SQL generation."
            metadata = $metadata
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-07-download-generator-inputs.json")

      # ==============================
      # 8. Build + Run SQL generator
      # ==============================
      - name: Build SQL Generator
        run: |
          dotnet build SAPSec.sln --configuration Release

      - name: Generate SQL Scripts
        env:
          REBUILD_ALL_RAW_TABLES: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild-all-raw-tables || 'false' }}
          RAW_TABLES_TO_REBUILD_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.raw-tables-to-rebuild-path || env.DEFAULT_RAW_TABLES_TO_REBUILD_PATH }}
        run: |
          dotnet run --configuration Release --project SAPData/SAPData.csproj
          echo "Generated SQL scripts."

      - name: Summarise SQL generation
        if: always()
        shell: pwsh
        env:
          REBUILD_ALL_RAW_TABLES: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild-all-raw-tables || 'false' }}
          RAW_TABLES_TO_REBUILD_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.raw-tables-to-rebuild-path || env.DEFAULT_RAW_TABLES_TO_REBUILD_PATH }}
        run: |
          $sqlDir = "SAPData/Sql"
          $reportDir = $env:PIPELINE_REPORT_DIR
          $sqlFiles = @(Get-ChildItem -Path $sqlDir -Filter *.sql -File -ErrorAction SilentlyContinue)
          $metadata = [ordered]@{
            sqlFileCount = $sqlFiles.Count
            rebuildAllRawTables = $env:REBUILD_ALL_RAW_TABLES
            rawTablesToRebuildPath = $env:RAW_TABLES_TO_REBUILD_PATH
            keyFiles = @(
              "00_cleanup.sql",
              "run_all.sql",
              "03_v_establishment.sql",
              "04_v_establishment_email.sql"
            ) | ForEach-Object {
              [pscustomobject]@{
                name = $_
                exists = Test-Path (Join-Path $sqlDir $_)
              }
            }
          }
          $summary = [pscustomobject]@{
            stage = "08-generate-sql"
            status = if ($sqlFiles.Count -gt 0) { "completed" } else { "failed" }
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = "Generated SQL scripts for cleanup, raw tables, views, and ETL execution."
            metadata = $metadata
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-08-generate-sql.json")

      - name: Set deployment variables
        shell: bash
        run: |
          set -euo pipefail
          source global_config/${DEPLOY_ENV}.sh
          tf_vars_file=${TF_VARS_PATH}/${DEPLOY_ENV}.tfvars.json
          echo "CLUSTER=$(jq -r '.cluster' ${tf_vars_file})" >> $GITHUB_ENV
          echo "NAMESPACE=$(jq -r '.namespace' ${tf_vars_file})" >> $GITHUB_ENV
          echo "RESOURCE_GROUP_NAME=${AZURE_RESOURCE_PREFIX}-${SERVICE_SHORT}-${CONFIG_SHORT}-rg" >> $GITHUB_ENV
          echo "STORAGE_ACCOUNT_NAME=${AZURE_RESOURCE_PREFIX}${SERVICE_SHORT}dbbkp${CONFIG_SHORT}sa" >> $GITHUB_ENV
          echo "DB_SERVER=${AZURE_RESOURCE_PREFIX}-${SERVICE_SHORT}-${CONFIG_SHORT}-pg" >> $GITHUB_ENV
          TODAY=$(date +"%F")
          BACKUP_FILE=${SERVICE_SHORT}_${CONFIG_SHORT}_post_data_pipeline_${TODAY}
          echo "BACKUP_FILE=${BACKUP_FILE}" >> $GITHUB_ENV
          echo "KEYVAULT_NAME=${AZURE_RESOURCE_PREFIX}-${SERVICE_SHORT}-${CONFIG_SHORT}-inf-kv" >> $GITHUB_ENV

      - name: Enable maintenance page
        id: enable_maintenance
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        shell: bash
        run: |
          set -euo pipefail
          primary_service="${SERVICE_NAME}-${DEPLOY_ENV}"
          maintenance_dir="${RUNNER_TEMP}/maintenance"
          backup_file="${maintenance_dir}/${DEPLOY_ENV}-ingresses.json"
          mkdir -p "${maintenance_dir}"

          maintenance_service="$(
            kubectl -n "${NAMESPACE}" get svc -o json |
              jq -r --arg exact "${SERVICE_NAME}-${DEPLOY_ENV}-maintenance" --arg generic "${SERVICE_NAME}-maintenance" '
                ([.items[].metadata.name] | unique) as $names
                | if ($names | index($exact)) then $exact
                  elif ($names | index($generic)) then $generic
                  else ($names[] | select(test("maintenance")))
                  end
              ' | head -n 1
          )"

          if [ -z "${maintenance_service}" ] || [ "${maintenance_service}" = "null" ]; then
            echo "No maintenance service found in namespace ${NAMESPACE}."
            kubectl -n "${NAMESPACE}" get svc
            exit 1
          fi

          maintenance_port_name="$(kubectl -n "${NAMESPACE}" get svc "${maintenance_service}" -o jsonpath='{.spec.ports[0].name}')"
          maintenance_port_number="$(kubectl -n "${NAMESPACE}" get svc "${maintenance_service}" -o jsonpath='{.spec.ports[0].port}')"

          ingress_json="$(kubectl -n "${NAMESPACE}" get ingress -o json)"
          matching_ingresses="$(
            printf '%s' "${ingress_json}" |
              jq -r --arg svc "${primary_service}" '
                .items[]
                | select(
                    ((.spec.defaultBackend.service.name // "") == $svc)
                    or any(.spec.rules[]?.http.paths[]?.backend.service.name; . == $svc)
                  )
                | .metadata.name
              '
          )"

          if [ -z "${matching_ingresses}" ]; then
            echo "No ingress found routing to service ${primary_service} in namespace ${NAMESPACE}."
            kubectl -n "${NAMESPACE}" get ingress -o wide
            exit 1
          fi

          printf '%s' "${ingress_json}" |
            jq --arg svc "${primary_service}" '
              {
                apiVersion: "v1",
                kind: "List",
                items: [
                  .items[]
                  | select(
                      ((.spec.defaultBackend.service.name // "") == $svc)
                      or any(.spec.rules[]?.http.paths[]?.backend.service.name; . == $svc)
                    )
                  | {
                      apiVersion,
                      kind,
                      metadata: {
                        name: .metadata.name,
                        namespace: .metadata.namespace,
                        labels: .metadata.labels,
                        annotations: .metadata.annotations
                      },
                      spec
                    }
                ]
              }
            ' > "${backup_file}"

          while IFS= read -r ingress_name; do
            current_file="${maintenance_dir}/${ingress_name}.json"
            kubectl -n "${NAMESPACE}" get ingress "${ingress_name}" -o json > "${current_file}"
            jq \
              --arg svc "${primary_service}" \
              --arg maint "${maintenance_service}" \
              --arg portName "${maintenance_port_name}" \
              --arg portNumber "${maintenance_port_number}" '
                def maintPort:
                  if ($portName | length) > 0
                  then {name: $portName}
                  else {number: ($portNumber | tonumber)}
                  end;
                .spec.defaultBackend |=
                  (if .service.name == $svc then {service: {name: $maint, port: maintPort}} else . end)
                | .spec.rules |= ((. // []) | map(
                    .http.paths |= (((. // [])) | map(
                      if .backend.service.name == $svc
                      then .backend.service = {name: $maint, port: maintPort}
                      else .
                      end
                    ))
                  ))
                | {
                    apiVersion,
                    kind,
                    metadata: {
                      name: .metadata.name,
                      namespace: .metadata.namespace,
                      labels: .metadata.labels,
                      annotations: .metadata.annotations
                    },
                    spec
                  }
              ' "${current_file}" | kubectl apply -f -
          done <<< "${matching_ingresses}"

          ingress_count="$(printf '%s\n' "${matching_ingresses}" | sed '/^$/d' | wc -l | xargs)"
          echo "maintenance_service=${maintenance_service}" >> "$GITHUB_OUTPUT"
          echo "ingress_count=${ingress_count}" >> "$GITHUB_OUTPUT"
          echo "backup_file=${backup_file}" >> "$GITHUB_OUTPUT"

      - name: Summarise maintenance enable
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
        shell: pwsh
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $summary = [pscustomobject]@{
            stage = "maintenance-enable"
            status = "${{ steps.enable_maintenance.outcome }}"
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = "Switched matching ingress routes to the maintenance service before ETL."
            metadata = [ordered]@{
              namespace = $env:NAMESPACE
              service = "${{ steps.enable_maintenance.outputs.maintenance_service }}"
              ingressCount = "${{ steps.enable_maintenance.outputs.ingress_count }}"
              backupFile = "${{ steps.enable_maintenance.outputs.backup_file }}"
            }
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-08b-maintenance-enable.json")

      # ==============================
      # 9. Run ETL via konduit (private DB) WITH RETRY on transient disconnects
      # ==============================
      - name: Run ETL pipeline via konduit (retry on transient DB disconnect)
        id: etl
        working-directory: SAPData/Sql
        shell: bash
        run: |
          set -euo pipefail
          echo "Running ETL via konduit (psql) with retry on transient disconnects"
          ls -la "$GITHUB_WORKSPACE/SAPData/Sql" || true
          max_attempts=5
          delay=10
          log_file="$GITHUB_WORKSPACE/SAPData/Sql/psql.log"
          report_file="${PIPELINE_REPORT_DIR}/stage-09-etl.json"
          retry_count=0
          last_classification="none"
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "ETL attempt $attempt/$max_attempts"
            set +e
            "$GITHUB_WORKSPACE/konduit.sh" \
              -n "${AKS_NAMESPACE}" \
              -t 28800 \
              -x \
              -i "$GITHUB_WORKSPACE/SAPData/Sql/run_all.sql" \
              "${KONDUIT_APP_NAME}" -- psql 2>&1 | tee "$log_file"
            exit_code=${PIPESTATUS[0]}
            set -e
            if [ $exit_code -eq 0 ]; then
              echo "ETL succeeded on attempt $attempt"
              cp "$log_file" "${PIPELINE_LOG_DIR}/psql.log" 2>/dev/null || true
              jq -n \
                --arg stage "09-etl" \
                --arg status "completed" \
                --arg summary "ETL completed successfully." \
                --arg utcTime "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                --arg logFile "${PIPELINE_LOG_DIR}/psql.log" \
                --argjson attempts "$attempt" \
                --argjson retryCount "$retry_count" \
                --arg classification "$last_classification" \
                '{
                  stage: $stage,
                  status: $status,
                  utcTime: $utcTime,
                  summary: $summary,
                  metadata: {
                    attempts: $attempts,
                    retryCount: $retryCount,
                    retryClassification: $classification,
                    logFile: $logFile
                  }
                }' > "$report_file"
              echo "attempts=$attempt" >> "$GITHUB_OUTPUT"
              echo "retry_count=$retry_count" >> "$GITHUB_OUTPUT"
              echo "retry_classification=$last_classification" >> "$GITHUB_OUTPUT"
              echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if grep -Eqi \
              "SSL error: unexpected eof|connection to server was lost|server closed the connection unexpectedly|could not receive data from server|terminating connection due to administrator command|EOF detected" \
              "$log_file"; then
              echo "Detected transient DB disconnect. Retrying after ${delay}s..."
              retry_count=$((retry_count + 1))
              last_classification="transient_db_disconnect"
              sleep $delay
              delay=$((delay * 2))
              if [ $delay -gt 120 ]; then delay=120; fi
              attempt=$((attempt + 1))
              continue
            fi
            echo "ETL failed with exit code $exit_code (not classified as transient)."
            last_classification="non_retryable"
            cp "$log_file" "${PIPELINE_LOG_DIR}/psql.log" 2>/dev/null || true
            jq -n \
              --arg stage "09-etl" \
              --arg status "failed" \
              --arg summary "ETL failed without matching retry classification." \
              --arg utcTime "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg logFile "${PIPELINE_LOG_DIR}/psql.log" \
              --argjson attempts "$attempt" \
              --argjson retryCount "$retry_count" \
              --arg classification "$last_classification" \
              --argjson exitCode "$exit_code" \
              '{
                stage: $stage,
                status: $status,
                utcTime: $utcTime,
                summary: $summary,
                metadata: {
                  attempts: $attempts,
                  retryCount: $retryCount,
                  retryClassification: $classification,
                  exitCode: $exitCode,
                  logFile: $logFile
                }
              }' > "$report_file"
            exit $exit_code
          done
          if [ $exit_code -ne 0 ]; then
            echo "ETL failed after $max_attempts attempts."
            last_classification="transient_db_disconnect"
            cp "$log_file" "${PIPELINE_LOG_DIR}/psql.log" 2>/dev/null || true
            jq -n \
              --arg stage "09-etl" \
              --arg status "failed" \
              --arg summary "ETL exhausted all retry attempts." \
              --arg utcTime "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg logFile "${PIPELINE_LOG_DIR}/psql.log" \
              --argjson attempts "$attempt" \
              --argjson retryCount "$retry_count" \
              --arg classification "$last_classification" \
              --argjson maxAttempts "$max_attempts" \
              '{
                stage: $stage,
                status: $status,
                utcTime: $utcTime,
                summary: $summary,
                metadata: {
                  attempts: $attempts,
                  retryCount: $retryCount,
                  retryClassification: $classification,
                  maxAttempts: $maxAttempts,
                  logFile: $logFile
                }
              }' > "$report_file"
            exit 2
          fi

      - name: Disable maintenance page
        id: disable_maintenance
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
        shell: bash
        run: |
          set -euo pipefail
          backup_file="${RUNNER_TEMP}/maintenance/${DEPLOY_ENV}-ingresses.json"
          if [ ! -f "${backup_file}" ]; then
            echo "No ingress backup found for ${DEPLOY_ENV}; skipping maintenance restore."
            echo "restore_status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -c '.items[]' "${backup_file}" | while IFS= read -r ingress_spec; do
            printf '%s\n' "${ingress_spec}" | kubectl apply -f -
          done
          echo "restore_status=completed" >> "$GITHUB_OUTPUT"

      - name: Summarise maintenance restore
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
        shell: pwsh
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $status = if ("${{ steps.disable_maintenance.outputs.restore_status }}") {
            "${{ steps.disable_maintenance.outputs.restore_status }}"
          } else {
            "${{ steps.disable_maintenance.outcome }}"
          }
          $summary = [pscustomobject]@{
            stage = "maintenance-disable"
            status = $status
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = "Restored ingress configuration after ETL."
            metadata = [ordered]@{
              environment = $env:DEPLOY_ENV
              restoreStatus = "${{ steps.disable_maintenance.outputs.restore_status }}"
            }
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-09b-maintenance-disable.json")

      # ==============================
      # 10. Create & upload DB backup (used to restore db in review app env)
      # ==============================
      - name: Create + upload review seed DB backup
        id: review_seed_backup
        if: ${{ env.DEPLOY_ENV == 'test' }}
        shell: bash
        run: |
          set -euo pipefail
          TODAY=$(TZ=Europe/London date +"%F")
          LOCAL_FILE="sapsec_review_seed_${TODAY}.sql.gz"
          report_file="${PIPELINE_REPORT_DIR}/stage-10-review-seed-backup.json"
          # Only ever keep this single blob in storage
          LATEST_BLOB="db-backups/sapsec_review_seed_${{ case(github.event.inputs.review-app-number == '', 'test', github.event.inputs.review-app-number) }}.sql.gz"
          echo "Creating DB dump -> ${LOCAL_FILE}"
          echo "AKS_NAMESPACE=${AKS_NAMESPACE}"
          echo "KONDUIT_APP_NAME=${KONDUIT_APP_NAME}"
          set +e
          "$GITHUB_WORKSPACE/konduit.sh" \
            -n "${AKS_NAMESPACE}" \
            -t 28800 \
            -x \
            "${KONDUIT_APP_NAME}" -- \
            pg_dump --format=plain --no-owner --no-privileges 2> konduit_pg_dump.log | gzip -c > "${LOCAL_FILE}"
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ $exit_code -ne 0 ]; then
            echo "konduit/pg_dump failed with exit code ${exit_code}"
            cp konduit_pg_dump.log "${PIPELINE_LOG_DIR}/konduit_pg_dump.log" 2>/dev/null || true
            jq -n \
              --arg stage "10-review-seed-backup" \
              --arg status "failed" \
              --arg summary "Review seed backup failed during pg_dump." \
              --arg utcTime "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg localFile "$LOCAL_FILE" \
              --arg blobName "$LATEST_BLOB" \
              --arg logFile "${PIPELINE_LOG_DIR}/konduit_pg_dump.log" \
              --argjson exitCode "$exit_code" \
              '{
                stage: $stage,
                status: $status,
                utcTime: $utcTime,
                summary: $summary,
                metadata: {
                  localFile: $localFile,
                  blobName: $blobName,
                  exitCode: $exitCode,
                  logFile: $logFile,
                  retried: false
                }
              }' > "$report_file"
            exit $exit_code
          fi
          ls -lh "${LOCAL_FILE}"
          echo "Uploading (overwriting) ${LATEST_BLOB} in container ${AZURE_STORAGE_CONTAINER}"
          az storage blob upload \
            --container-name "${AZURE_STORAGE_CONTAINER}" \
            --name "${LATEST_BLOB}" \
            --file "${LOCAL_FILE}" \
            --connection-string "${AZURE_STORAGE_CONNECTION_STRING}" \
            --overwrite true >/dev/null
          echo "Seed backup uploaded:"
          echo "  ${AZURE_STORAGE_CONTAINER}/${LATEST_BLOB}"
          echo "  ${AZURE_STORAGE_CONTAINER}/${LATEST_BLOB}"
          cp konduit_pg_dump.log "${PIPELINE_LOG_DIR}/konduit_pg_dump.log" 2>/dev/null || true
          file_size_bytes="$(wc -c < "${LOCAL_FILE}" | xargs)"
          jq -n \
            --arg stage "10-review-seed-backup" \
            --arg status "completed" \
            --arg summary "Created and uploaded the review seed backup." \
            --arg utcTime "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg localFile "$LOCAL_FILE" \
            --arg blobName "$LATEST_BLOB" \
            --arg containerName "$AZURE_STORAGE_CONTAINER" \
            --arg logFile "${PIPELINE_LOG_DIR}/konduit_pg_dump.log" \
            --argjson fileSizeBytes "$file_size_bytes" \
            '{
              stage: $stage,
              status: $status,
              utcTime: $utcTime,
              summary: $summary,
              metadata: {
                localFile: $localFile,
                blobName: $blobName,
                containerName: $containerName,
                fileSizeBytes: $fileSizeBytes,
                logFile: $logFile,
                retried: false
              }
            }' > "$report_file"
      
      # ==============================
      # 11. Backup target DB (if pipeline was run normally)
      # ==============================
      - name: Backup ${{ env.DEPLOY_ENV }} postgres (if pipeline was run normally)
        id: backup_target_db
        if: ${{ env.DEPLOY_ENV == 'test' && inputs.review-app-number == '' }}
        uses: DFE-Digital/github-actions/backup-postgres@master
        with:
          storage-account: ${{ env.STORAGE_ACCOUNT_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP_NAME }}
          app-name: ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }}
          namespace: ${{ env.NAMESPACE }}
          cluster: ${{ env.CLUSTER }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          backup-file: ${{ env.BACKUP_FILE }}.sql
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}

      - name: Summarise environment backup
        if: always()
        shell: pwsh
        env:
          REVIEW_APP_NUMBER: ${{ inputs.review-app-number }}
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $shouldRun = $env:DEPLOY_ENV -eq "test" -and [string]::IsNullOrWhiteSpace($env:REVIEW_APP_NUMBER)
          $status = if ($shouldRun) { "${{ steps.backup_target_db.outcome }}" } else { "skipped" }
          $summaryText = if ($shouldRun) {
            "Backed up the target environment after a normal test pipeline run."
          } else {
            "Skipped target environment backup for this run mode."
          }
          $summary = [pscustomobject]@{
            stage = "11-environment-backup"
            status = $status
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = $summaryText
            metadata = [ordered]@{
              environment = $env:DEPLOY_ENV
              reviewAppNumber = $env:REVIEW_APP_NUMBER
              backupFile = "${env:BACKUP_FILE}.sql"
              shouldRun = $shouldRun
            }
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-11-environment-backup.json")
      
      # ==============================
      # 12. Restore DB backup (if pipeline was run to to create a backup for a review app)
      # ==============================
      - name: Restore ${{ env.DEPLOY_ENV }} postgres (if pipeline was run to to create a backup for a review app)
        id: restore_target_db
        if: ${{ env.DEPLOY_ENV == 'test' && inputs.review-app-number != '' }}
        uses: DFE-Digital/github-actions/restore-postgres-backup@master
        with:
          storage-account: ${{ env.STORAGE_ACCOUNT_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP_NAME }}
          app-name: ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }}
          namespace: ${{ env.NAMESPACE }}
          cluster: ${{ env.CLUSTER }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          backup-file: ${{ env.BACKUP_FILE }}.sql.gz

      - name: Summarise review seed backup
        if: always()
        shell: pwsh
        env:
          REVIEW_APP_NUMBER: ${{ inputs.review-app-number }}
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $reportPath = Join-Path $reportDir "stage-10-review-seed-backup.json"
          if (Test-Path $reportPath) {
            exit 0
          }

          $shouldRun = $env:DEPLOY_ENV -eq "test"
          $status = if ($shouldRun) { "${{ steps.review_seed_backup.outcome }}" } else { "skipped" }
          $summaryText = if ($shouldRun) {
            "Review seed backup step did not emit a structured report."
          } else {
            "Skipped review seed backup outside the test environment."
          }
          $summary = [pscustomobject]@{
            stage = "10-review-seed-backup"
            status = $status
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = $summaryText
            metadata = [ordered]@{
              environment = $env:DEPLOY_ENV
              reviewAppNumber = $env:REVIEW_APP_NUMBER
              shouldRun = $shouldRun
            }
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path $reportPath

      - name: Summarise review restore
        if: always()
        shell: pwsh
        env:
          REVIEW_APP_NUMBER: ${{ inputs.review-app-number }}
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $shouldRun = $env:DEPLOY_ENV -eq "test" -and -not [string]::IsNullOrWhiteSpace($env:REVIEW_APP_NUMBER)
          $status = if ($shouldRun) { "${{ steps.restore_target_db.outcome }}" } else { "skipped" }
          $summaryText = if ($shouldRun) {
            "Restored the test database from the generated backup for a review app."
          } else {
            "Skipped review restore because no review app number was supplied."
          }
          $summary = [pscustomobject]@{
            stage = "12-review-restore"
            status = $status
            utcTime = [DateTime]::UtcNow.ToString("o")
            summary = $summaryText
            metadata = [ordered]@{
              environment = $env:DEPLOY_ENV
              reviewAppNumber = $env:REVIEW_APP_NUMBER
              backupFile = "${env:BACKUP_FILE}.sql.gz"
              shouldRun = $shouldRun
            }
          }
          $summary | ConvertTo-Json -Depth 10 | Set-Content -Path (Join-Path $reportDir "stage-12-review-restore.json")

      - name: Publish pipeline stage summary
        if: always()
        shell: pwsh
        run: |
          $reportDir = $env:PIPELINE_REPORT_DIR
          $stageFiles = @(Get-ChildItem -Path $reportDir -Filter "stage-*.json" -File -ErrorAction SilentlyContinue | Sort-Object Name)
          if ($stageFiles.Count -eq 0) {
            "## Data pipeline stage summary" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            "" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            "No structured stage reports were created." | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            exit 0
          }

          $reports = foreach ($file in $stageFiles) {
            $report = Get-Content $file.FullName -Raw | ConvertFrom-Json
            [pscustomobject]@{
              stage = [string]$report.stage
              status = [string]$report.status
              summary = [string]$report.summary
              retryCount = if ($null -ne $report.metadata.retryCount) { [int]$report.metadata.retryCount } else { 0 }
            }
          }

          $changedStages = @($reports | Where-Object status -eq "changed" | Select-Object -ExpandProperty stage)
          $skippedStages = @($reports | Where-Object status -eq "skipped" | Select-Object -ExpandProperty stage)
          $failedStages = @($reports | Where-Object { $_.status -in @("failed", "failure") } | Select-Object -ExpandProperty stage)
          $retriedStages = @($reports | Where-Object retryCount -gt 0 | ForEach-Object { "$($_.stage) ($($_.retryCount))" })

          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add("## Data pipeline stage summary")
          $lines.Add("")
          $lines.Add("| Stage | Status | Retries | Summary |")
          $lines.Add("| --- | --- | ---: | --- |")
          foreach ($report in $reports) {
            $lines.Add("| $($report.stage) | $($report.status) | $($report.retryCount) | $($report.summary) |")
          }
          $lines.Add("")
          $lines.Add("Changed: " + ($(if ($changedStages.Count -gt 0) { $changedStages -join ", " } else { "none" })))
          $lines.Add("Skipped: " + ($(if ($skippedStages.Count -gt 0) { $skippedStages -join ", " } else { "none" })))
          $lines.Add("Failed: " + ($(if ($failedStages.Count -gt 0) { $failedStages -join ", " } else { "none" })))
          $lines.Add("Retried: " + ($(if ($retriedStages.Count -gt 0) { $retriedStages -join ", " } else { "none" })))
          $lines | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Upload pipeline stage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-pipeline-stage-report-${{ matrix.target_env }}
          path: ${{ env.PIPELINE_REPORT_DIR }}
          if-no-files-found: warn
