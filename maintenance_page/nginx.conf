server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The live app sets auth/session cookies. During maintenance those cookies
    # are still sent to this lightweight nginx backend, so allow larger request
    # headers to avoid 400 Bad Request responses.
    client_header_buffer_size 16k;
    large_client_header_buffers 4 32k;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
